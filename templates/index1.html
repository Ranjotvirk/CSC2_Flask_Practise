<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewpoint" content="width=device-width, initial-scale=1.0">
    <title>Flower Shop</title>
</head>

<body>

    <h1>Displaying JSON Flower Data</h1>

    <ul>
        {% for flower, details in flowers.items() %}
            <li>
                {{ flower }} - ${{ details.price }}
                (Stock: {{ details.stock }})
            </li>
        {% endfor %}
    </ul>

    <h2>Add-ons Available</h2>

    <ul>
        {% for addon, details in addons.items() %}
            <li>
                {{ addon }} - (${{ details.price }})
            </li>
        {% endfor %}
    </ul>

</body>
</html>
